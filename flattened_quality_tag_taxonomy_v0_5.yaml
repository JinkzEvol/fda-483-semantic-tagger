candidate_metadata_requirements:
  # Unchanged from v0.2
  required_minimum:
    - object_id
    - object_type
    - title
    - canonical_tags
    - scope
    - status
  recommended:
    - site
    - product
    - dosage_form
    - effective_date
    - current_version
    - superseded_by
    - evidence_density

match_policy:
  # Unchanged from v0.2. The match policy is deliberately taxonomy-agnostic so
  # that vocabulary growth does not require scoring-policy changes.
  status_weights:
    observed: 1.0
    inferred: 0.6

  category_groups:
    direct:
      - site
      - product
      - dosage_form
      - procedure_id
      - sop_id
      - instrument_id
    semantic:
      - system
      - quality_theme
      - process
      - control_object
      - issue_pattern
    context:
      - org_unit
      - record_type
      - asset_type
      - scope
    supportive:
      - evidence_type
      - risk_domain

  scoring:
    direct_exact_match: 5
    semantic_match: 3
    context_match: 2
    supportive_match: 1
    direct_conflict_penalty: -4
    semantic_conflict_penalty: -2
    has_direct_match_boost: 2
    semantic_cluster_boost: 1

  semantic_cluster_rule:
    description: >-
      Award semantic_cluster_boost when at least two semantic tags match and at least one
      control_object or issue_pattern tag also matches.

  direct_match_rule:
    description: >-
      Award has_direct_match_boost when at least one direct category has an exact shared
      observed tag, for example site, product, procedure_id, sop_id, dosage_form, or instrument_id.

  conflicts:
    direct_conflict_categories:
      - site
      - product
      - dosage_form
      - procedure_id
      - sop_id
      - instrument_id
    semantic_conflict_examples:
      - "query process=batch_record_review vs candidate process=calibration_only"
      - "query system=laboratory_control_system vs candidate system=facility_and_equipment_system when candidate has no cross-system scope"
      - "query record_type=batch_record vs candidate record_type=calibration_record for workflow-specific retrieval"
      # v0.3 examples (illustrative only — these are not rule definitions):
      - "query process=aseptic_processing vs candidate business_operation=pack with no manufacture or sterilize — operation-filter incompatibility"
      - "query system=sterile_manufacturing_system vs candidate system=solid_dose_manufacturing_system when no cross-system scope"

  score_caps:
    explicit_site_present_and_no_matching_site_and_not_global_scope: 3
    explicit_product_present_and_no_matching_product: 4
    only_inferred_matches_and_no_observed_matches: 2
    workflow_record_type_incompatible: 3

  gating_rules:
    - id: explicit_site_gate
      rule: >-
        If source text contains an explicit observed site tag, candidates without the same site tag
        and without scope:global must have their score capped.
    - id: explicit_product_gate
      rule: >-
        If source text contains an explicit observed product tag, candidates without the same product
        tag must have their score capped even if semantic overlap is strong.
    - id: direct_identifier_priority
      rule: >-
        If any direct observed tag exists in source text, a candidate with a matching direct observed tag
        must outrank candidates with semantic-only similarity unless capped by conflicts.
    - id: workflow_compatibility_gate
      rule: >-
        If the candidate document's record_type or process is incompatible with the retrieval workflow,
        cap the score even when broad quality themes overlap.

  tiebreakers:
    ordered:
      - more_observed_shared_tags
      - more_direct_shared_tags
      - stronger_evidence_density
      - current_status_over_superseded
      - recency_if_relevant

taxonomy_update_policy:
  default_mode: propose_only
  can_auto_add_registry_entries:
    - site
    - product
    - sop_id
    - policy_id
    - event_id
    - instrument_id
    - procedure_id
    - document_id
    - software
  propose_only_for_semantic_values:
    - scope
    - system
    - org_unit
    - process
    - quality_theme
    - issue_pattern
    - control_object
    - record_type
    - asset_type
    - evidence_type
    - risk_domain
  top_level_category_change:
    allowed: false
    override_condition: >-
      Only propose a new top-level category when repeated tagging failures across multiple documents
      show a structural gap that cannot be solved with existing categories.
  value_citation_requirement:
    # v0.3 addition
    new_value_guidance: >-
      New semantic values SHOULD carry a value_citations anchor referencing an
      authoritative source (CFR section, USP chapter, ICH guideline, FDA guidance
      document, or equivalent international authority). Missing anchors do not
      invalidate a value but flag it as a future curation target.
    enforcement: advisory
  dosage_form_supersession:
    # v0.3 addition
    description: >-
      Legacy dosage_form values are retained but aliased to granular successors.
      Newly tagged records SHOULD use granular successors. Retagging of historical
      records is discretionary and MAY be performed during batch backfill operations.
    aliased_values:
      - tablet
      - capsule
      - suspension
      - sterile_injection
      - cream
      - ointment

output_contract:
  # Unchanged from v0.2. The output contract is deliberately vocabulary-agnostic.
  required_fields:
    - taxonomy_version_used
    - document_metadata
    - observation_tags
    - document_level_tags
    - candidate_matches
    - taxonomy_update_proposals
    - coverage_gaps

consuming_systems:
  # v0.3 addition — explicit cross-reference to downstream consumers.
  # Populated to support change-impact analysis when this taxonomy is revised.
  - system: "GxP Sentinel 483 Semantic Tagger"
    skill_file: "fda_483_semantic_tagger_SKILL.md"
    role: "emits observation_tags using categories declared here"
    pipeline_version_gating: "Tagger must bump pipeline_version when taxonomy is bumped."
    # v0.4 addition — dual-vocabulary handling note
    v0_4_dual_vocabulary_note: >-
      Medical device citations pre-2026-02-02 use QSR (21 CFR 820 pre-QMSR)
      terminology — "Device Master Record" §820.181, "Device History Record"
      §820.184, QSR subpart letters, Quality System Inspection Technique (QSIT).
      Citations from 2026-02-02 onward use QMSR terminology — ISO 13485:2016
      clause references, "Medical Device File" §4.2.3, Compliance Program
      7382.850 inspection technique. The tagger MUST handle both vocabularies
      in parallel; retagging historical QSR citations to QMSR terminology is
      discretionary and MAY be performed during batch backfill operations.
      Where a QSR concept aliases to a QMSR concept (e.g., DMR → MDF), the
      `aliases.record_type` and `aliases.control_object` sections of this
      taxonomy document the conceptual mapping with disambiguation notes.
      Per IMP-TAX-015.
    # v0.5 addition — aliases completion note
    v0_5_aliases_completion_note: >-
      v0.5 completes the population of aliases.control_object and aliases.process
      that the v0.4 revision-history entry claimed but did not deliver (only the
      DMR→MDF pair is materially added; DHF and DHR are preserved because they
      are conceptually retained across the QSR→QMSR transition rather than
      renamed). Tagger uptake of v0.5 should (a) emit DMR-family control_object
      and process values using the v0.5 canonical targets (medical_device_file_*)
      when the citation is written under QMSR / ISO 13485, and (b) emit the
      QSR-anchored values (device_master_record_*) when the citation directly
      references §820.181 — matching the existing aliases.record_type.
      device_master_record propose_only discipline. Both sides resolve under
      match_policy to the same conceptual target via the alias.
      Per IMP-TAX-004 v0.5 uptake.
  - system: "GxP Sentinel Phase 2 SPEC-105 Citation Taxonomy"
    spec: "GXP-SYS-PH2-008 §6"
    role: "stores observation_tags in enriched.citation_tags"
    pipeline_version_gating: "Re-tagging of historical citations required when new values become available for concepts that were previously only captured inferentially."
  - system: "GxP Sentinel Phase 2.1 operation_control_matrix"
    spec: "GXP-SYS-PH2.1-001 §5.3"
    role: "references expected_semantic_tags, expected_context_tags, expected_supportive_tags using categories declared here"
    pipeline_version_gating: "Matrix rule authoring must match current taxonomy version."
    # v0.4 addition — device-side matrix scope
    v0_4_device_scope_note: >-
      Phase 2.1 v1.2 operation_control_matrix is drug/biologic-focused. Device
      product shapes (product_shape.molecular_class ∈ {medical_device_class_i,
      medical_device_class_ii, medical_device_class_iii, ivd, samd,
      combination_product}) and operation axis values (design_control,
      device_manufacturing, device_servicing, device_postmarket_surveillance)
      are v0.4 vocabulary but not yet wired into the matrix. Device-side matrix
      rule authoring is Phase 2.1 v1.3 or Phase 2.2 scope (IMP-TAX-015).
  - system: "GxP Sentinel Phase 2.1 site_control_risk_profile"
    spec: "GXP-SYS-PH2.1-001 §5.6"
    role: "joins expected tag bundles to observed citation tag bundles using this taxonomy's category_groups and match_policy scoring"
    pipeline_version_gating: "Refuses to compute when expected and observed bundles were generated under different taxonomy versions until both sides are brought forward."
