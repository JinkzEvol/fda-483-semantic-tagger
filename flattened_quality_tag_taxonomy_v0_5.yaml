taxonomy_version: "0.5"
name: "flattened_quality_tag_taxonomy"
purpose: >-
  Stable, flattened semantic ontology for tagging FDA 483 observations and enterprise
  quality objects so they can be matched using traceable, hybrid similarity rather than
  embeddings alone. Manufacturing-domain coverage extended in v0.3 (pharma sterile,
  solid-dose, API, biologics). Medical-device and post-market-surveillance coverage
  added in v0.4 per audit GXP-AUDIT-TAX-001 v1.2 — spanning legacy 21 CFR 820 QSR
  subparts and the Quality Management System Regulation (QMSR, effective 2026-02-02,
  incorporating ISO 13485:2016 by reference), plus 21 CFR Part 803 (MDR), Part 806
  (Corrections and Removals), Part 807 (Establishment Registration and Listing),
  Part 812 (IDE), Part 830 (UDI), and Part 820.45 (new QMSR labeling/packaging visual
  verification requirement). FDCA statutory and 21 CFR Part 606/630/640 human blood
  and plasma CGMP vocabulary also added in v0.4 per audit v1.1 §5.6 IMP-TAX-013 /
  IMP-TAX-014. v0.5 is the active working release. It includes the earlier alias and
  value-citation corrections plus the later technical-assessment updates captured in
  this file for scope, systems, org units, processes, record types, asset types, and
  control objects.

tag_format: "category:value"

normalization:
  case: "snake_case_lower"
  separator: ":"
  multi_value_allowed: true
  evidence_required: true
  aliases_allowed: true
  alias_write_mode_default: "propose_only"

revision_history:
  - version: "0.2"
    date: "(prior release)"
    summary: >-
      Initial flattened taxonomy derived from a laboratory / data-integrity /
      chromatographic-processing / packaging 483 case. 132 semantic+context+supportive
      values across 11 categories plus enterprise registry categories.
  - version: "0.3"
    date: "2026-04-20"
    summary: >-
      Manufacturing-domain expansion per audit GXP-AUDIT-TAX-001. 139 new values added
      across 9 categories (system +5, process +35, quality_theme +10, control_object +26,
      issue_pattern +17, record_type +17, asset_type +20, evidence_type +5, risk_domain +3),
      plus 16 new granular dosage_form values in the enterprise registry.
      aliases dict populated for 7 legacy dosage_form values (tablet, capsule, suspension,
      sterile_injection, cream, ointment, powder). No top-level category changes
      (taxonomy_update_policy.top_level_category_change.allowed remains false). New optional
      sidecar section value_citations provides authoritative anchors (CFR / USP / ICH) for
      new values where applicable. Structure remains propose_only pending Quality Domain
      Lead approval.
  - version: "0.3 (draft-time remediation)"
    date: "2026-04-20"
    summary: >-
      Post-remediation draft edits applied following cross-check
      GXP-XCHECK-PH2.1-001 v1.1. v0.3 is still in propose_only mode so these changes
      are in-draft corrections rather than a new approved version.
      R2: added enterprise_registry_categories.dosage_form.oral_powder — brings v0.3
      granular-dosage-form discipline to coverage of oral powders, aligning with
      GxP Sentinel Phase 2.1 v1.2 §1.3 product_shape_tags.dosage_form_class vocabulary.
      R3: added aliases.dosage_form.powder → oral_powder (propose_only), with note
      permitting retag to inhalation_dpi / topical powders where evidence warrants.
      R4: added value_citations.dosage_form.oral_powder (advisory anchor).
      No other categories affected. Pre-remediation total 138 new semantic/context/
      supportive values + 15 granular dosage_forms; post-remediation 138 semantic/context/
      supportive + 16 granular dosage_forms and 7 dosage_form aliases.
  - version: "0.4 (candidate scope; not yet drafted)"
    date: "pending"
    summary: >-
      Candidate post-approval scope captured from audit v1.1 §5.6 empirical pass.
      IMP-TAX-013: add issue_pattern:adulteration_finding and
      issue_pattern:misbranding_finding to cover FDCA statutory violations (~6% of the
      in-scope drug/biologic 483 corpus at audit time).
      IMP-TAX-014: add system:blood_and_plasma_cgmp_system and adjacent vocabulary
      for 21 CFR Part 606/630/640 blood and plasma CGMP (small but non-trivial
      slice of current corpus). Both deferred to a Quality-Domain-Lead-scoped
      v0.4 draft; not required for Phase 2.1 v1.2 operational scope.
      (Note: this entry is preserved from v0.3 revision history as the historical
      v0.4 candidate scope; actual v0.4 content — including medical devices —
      is recorded in the subsequent entry.)
  - version: "0.4"
    date: "2026-04-20"
    summary: >-
      Medical-device, FDCA-statutory, and blood/plasma CGMP coverage expansion
      per audit GXP-AUDIT-TAX-001 v1.2. Closes IMP-TAX-013 (FDCA statutory),
      IMP-TAX-014 (blood/plasma CGMP), and IMP-TAX-015 (medical devices, added in
      audit v1.2 from in-session user request). Scope this release:
      MEDICAL DEVICES — covers both the legacy 21 CFR 820 Quality System
      Regulation (QSR) subpart structure (used on all pre-2026-02-02 FDA 483
      citations in the corpus) and the Quality Management System Regulation
      (QMSR, effective 2026-02-02, which incorporates ISO 13485:2016 by reference
      and adds §820.45 labeling/packaging visual verification). 101 new values
      added across 9 categories for devices (system +3, process +31,
      quality_theme +8, control_object +23, issue_pattern +13, record_type +12,
      asset_type +6, evidence_type +3, risk_domain +2). device_class_ii-style
      discriminators held out of this release as product-shape concerns handled
      by downstream phase specs, not taxonomy categories. Adjacent regulations
      covered by new values — 21 CFR Part 803 (MDR), Part 806 (Corrections and
      Removals), Part 807 (Establishment Registration and Listing), Part 812
      (IDE), Part 830 (UDI). QSR→ISO 13485 conceptual aliases populated in
      aliases.control_object and aliases.process for the DHR/DMR/MDF/DHF family
      so that historical QSR-era citations and forward QMSR-era citations share
      a single semantic-matching layer.
      FDCA STATUTORY — 2 new issue_pattern values
      (adulteration_finding, misbranding_finding) plus record_type:statutory_finding.
      BLOOD/PLASMA CGMP — 14 new values across system, process, control_object,
      issue_pattern, record_type, asset_type.
      Total v0.4 additions: 118 new semantic/context/supportive values. No top-level
      category changes (taxonomy_update_policy.top_level_category_change.allowed
      remains false). Structure remains propose_only pending Quality Domain Lead
      approval.
  - version: "0.5"
    date: "2026-04-21"
    summary: >-
      Corrective release supplementing v0.4. Three corrective workstreams:

      C1 — QSR→ISO 13485 conceptual aliases for the Device Master Record /
      Medical Device File pair. The v0.4 revision-history entry asserted:
      "QSR→ISO 13485 conceptual aliases populated in aliases.control_object and
      aliases.process for the DHR/DMR/MDF/DHF family so that historical QSR-era
      citations and forward QMSR-era citations share a single semantic-matching
      layer." Inspection of v0.4 showed only the existing aliases.dosage_form
      (7 entries) and aliases.record_type (1 entry — device_master_record →
      medical_device_file_record) populated; aliases.control_object and
      aliases.process were absent entirely. v0.5 closes this by adding the
      two DMR→MDF alias entries required to honour the v0.4 claim for the
      DMR/MDF axis:
        aliases.control_object:
          device_master_record_control → medical_device_file_control
        aliases.process:
          device_master_record_maintenance → medical_device_file_maintenance
      Both are propose_only per taxonomy_update_policy and carry disambiguation
      notes consistent with the existing aliases.record_type.device_master_record
      entry — the ISO 13485 §4.2.3 Medical Device File concept is a superset of
      the QSR 21 CFR 820.181 Device Master Record concept, so citations that
      reference §820.181 directly should retain the QSR-anchored value and
      citations written under QMSR / ISO 13485 should use the ISO-anchored
      value.

      Scope constraint for C1. The v0.4 narrative's claim of a DHR/DMR/MDF/DHF
      "family" is narrower in practice than the wording suggests — only DMR→MDF
      is a genuine QSR→QMSR rename. Design History File (DHF, §820.30(j)) and
      Device History Record (DHR, §820.184) are preserved conceptually across
      QSR and QMSR: ISO 13485 §7.3.10 does use the wording "design and
      development files" and §4.2.5 does address records management, but these
      are closer to refinements of the QSR concept than renames, and v0.4 did
      not introduce `design_and_development_files_control/_maintenance` or any
      DHR-side ISO target values to stable_categories. v0.5 therefore matches
      the existing v0.4 comment pattern for aliases.record_type (which explicitly
      explains why no DHF alias is added there): DHF and DHR remain
      first-class values without aliases. If a future release introduces
      dedicated ISO-side target values for DHF / DHR concepts, aliases for
      those pairs can be added without schema change. A clarifying comment is
      added to the aliases section in v0.5 to record this decision.

      The corresponding value_citations anchors for device_master_record_control
      and device_master_record_maintenance already exist in v0.4 with dual QSR+ISO
      cites; no change to value_citations needed for C1.

      C2 — count correction. The v0.4 revision-history summary states "Total v0.4
      additions: 118 new semantic/context/supportive values" with a device
      breakdown of "+3 +31 +8 +23 +13 +12 +6 +3 +2 = 101" and a claimed FDCA=3
      + blood/plasma=14 → 118. Mechanical diff between v0.3 and v0.4 stable_categories
      (computed by set-difference in Python) yields 123 additions with a per-category
      breakdown of: system +4, process +37, quality_theme +8, control_object +30,
      issue_pattern +16, record_type +15, asset_type +7, evidence_type +4, risk_domain
      +2. The v0.4 narrative did not wrong-count devices per se; it did not enumerate
      the overlap between device, FDCA, and blood/plasma additions that share
      values at the system / process / control_object axes, and it omitted the
      two record_type values that serve device + blood/plasma jointly. The v0.4
      entry is left intact above (per revision-history constitutional rule);
      the correct mechanical figure of record is 123 for all tooling, cross-check,
      and downstream spec references from v0.5 onward. No stable_categories or
      value_citations content changes for C2 — it is a revision-history
      reconciliation only.

      C3 — value_citations gap-fills for audit IMP-TAX-011 residual. Audit v1.2
      §5.3 flagged that v0.3-era drug/biologic record_type and evidence_type
      values carried thin value_citations anchors relative to their device-side
      equivalents. v0.5 adds anchors for five of the highest-priority
      drug/biologic entries that (a) exist in v0.4 stable_categories,
      (b) correspond to named regulatory or compendial concepts per
      taxonomy_update_policy.value_citation_requirement.guidance, and (c) are
      currently unanchored: record_type.batch_record,
      record_type.change_control_record, record_type.validation_report_record,
      evidence_type.validation_protocol_review,
      evidence_type.audit_trail_review. All five entries follow the existing
      v0.4 entry shape (CFR + ICH/USP anchor pair where available; CFR-only
      where not). Coverage remains advisory per
      taxonomy_update_policy.value_citation_requirement.enforcement: advisory.

      Total v0.5 delta versus v0.4: 2 aliases added (1 control_object + 1 process,
      the DMR→MDF pair); 5 value_citations entries added; 0 stable_categories
      changes; 1 revision-history narrative correction recorded (C2);
      1 scope-clarifying alias comment (C1 — DHF / DHR preservation). Structure
      remains propose_only pending Quality Domain Lead approval.
      consuming_systems additions flag the v0.5 dual-vocabulary completion for
      fda_483_semantic_tagger_SKILL IMP-TAX-004 v0.5 uptake and for
      GxP Sentinel Phase 2.1 v1.3 taxonomy_version gating.
  - version: "0.5 (technical assessment update)"
    date: "2026-05-04"
    summary: >-
      Applied system technical assessment outcomes to the active v0.5 taxonomy.
      Simplified scope granularity with market_local, market_group,
      dosage_form_specific, manufacturing_stage_specific, and
      material_storage_location_specific; added waste_handling_system; expanded
      org_unit, enterprise_object_type, record_type, asset_type, and
      control_object coverage; consolidated complaint processes to complaint_intake
      and complaint_investigation; and removed superseded values called out by the
      assessment.

modeling_principles:
  - "Keep top-level categories stable; prefer reusing existing categories."
  - "Allow enterprise registries to grow; do not confuse registry growth with ontology drift."
  - "Prefer canonical values over synonyms; manage synonyms as aliases."
  - "Separate observed tags from inferred tags."
  - "Every tag must trace back to evidence text."
  - "Use metadata for document lifecycle, status, and recency rather than forcing them into ontology tags unless needed for matching."
  - "New values in v0.3 onward should carry a value_citations anchor when the value corresponds to a named regulatory or compendial concept."

