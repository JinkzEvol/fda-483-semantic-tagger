aliases:
  # v0.3: populated for the first time. Legacy dosage_form values alias to the
  # granular v0.3 successors. Per alias_write_mode_default=propose_only, these
  # additions are proposed and require Quality Domain Lead approval before
  # production use. Retaining the legacy values prevents breaking previously
  # tagged records.
  dosage_form:
    tablet:
      alias_to: oral_solid_tablet
      proposed_at: "2026-04-20"
      approval_status: "propose_only"
      note: "Legacy v0.2 value. New tagging should use oral_solid_tablet."
    capsule:
      alias_to: oral_solid_capsule
      proposed_at: "2026-04-20"
      approval_status: "propose_only"
      note: "Legacy v0.2 value. New tagging should use oral_solid_capsule."
    suspension:
      alias_to: oral_liquid_suspension
      proposed_at: "2026-04-20"
      approval_status: "propose_only"
      note: >-
        Legacy v0.2 value. Best-effort mapping to oral_liquid_suspension.
        Where evidence indicates an injectable suspension, retag to
        injectable_suspension.
    sterile_injection:
      alias_to: injectable_solution
      proposed_at: "2026-04-20"
      approval_status: "propose_only"
      note: >-
        Legacy v0.2 value. Coarse alias to injectable_solution as a best-effort
        default. Where evidence indicates a lyophilized or suspension formulation,
        retag to injectable_lyophilized or injectable_suspension accordingly.
    cream:
      alias_to: topical_cream
      proposed_at: "2026-04-20"
      approval_status: "propose_only"
      note: "Legacy v0.2 value. New tagging should use topical_cream."
    ointment:
      alias_to: topical_ointment
      proposed_at: "2026-04-20"
      approval_status: "propose_only"
      note: >-
        Legacy v0.2 value. Best-effort mapping to topical_ointment.
        Where evidence indicates ophthalmic use, retag to ophthalmic_ointment.
    powder:
      alias_to: oral_powder
      proposed_at: "2026-04-20"
      approval_status: "propose_only"
      note: >-
        Legacy v0.2 value. Best-effort alias to oral_powder as a coarse default.
        Where evidence indicates a non-oral powder (e.g., inhalation dry-powder
        inhaler content, topical dusting powder), retag to inhalation_dpi or the
        appropriate granular value. Post-remediation addition per cross-check
        GXP-XCHECK-PH2.1-001 v1.1 §3.2 remediation R3.

  # v0.4 additions — medical device QSR ↔ QMSR/ISO 13485 conceptual pairings.
  # Purpose: the FDA's transition from the Quality System Regulation (QSR) to
  # the Quality Management System Regulation (QMSR, effective 2026-02-02) moved
  # citations from using QSR-specific terminology (e.g., "Device Master Record",
  # §820.181) to using ISO 13485:2016 terminology as incorporated by reference
  # (e.g., "Medical Device File", ISO 13485 §4.2.3). All 149 Part 820 citations
  # in the current corpus pre-date 2026-02-02, so historical citations use QSR
  # vocabulary. Forward citations will increasingly use QMSR vocabulary.
  # These aliases are DELIBERATELY NOT IDENTITY MAPPINGS — they record the
  # nearest conceptual equivalent and explicitly document the disambiguation
  # required at tagging time. Same pattern as the legacy dosage_form aliases:
  # propose_only by default; the Quality Domain Lead approves before production
  # use of the alias by downstream systems.
  record_type:
    device_master_record:
      alias_to: medical_device_file_record
      proposed_at: "2026-04-20"
      approval_status: "propose_only"
      note: >-
        QSR-era term (21 CFR 820.181, pre-2026-02-02). Best-effort mapping to
        the broader ISO 13485 §4.2.3 Medical Device File concept. The MDF is a
        superset: a DMR is narrower than an MDF in both scope and required
        content. For citations that reference QSR §820.181 directly, retain
        device_master_record. For QMSR-era citations or enterprise quality
        objects authored under ISO 13485, use medical_device_file_record.
        Per IMP-TAX-015.
  # No control_object alias: design_history_file_record (DHF) as a record survives
  # the QSR→QMSR transition conceptually — ISO 13485 MDF "references" the DHF
  # content but does not supersede it — so no alias is needed. The DHF is
  # retained as a first-class record_type in v0.4.

  # v0.5 additions — honouring the v0.4 revision-history claim that
  # QSR→ISO 13485 aliases are populated in aliases.control_object and
  # aliases.process. Scope is narrower than the v0.4 narrative suggested: only
  # the Device Master Record → Medical Device File pair is a genuine QSR→QMSR
  # rename. Design History File (§820.30(j)) and Device History Record
  # (§820.184) are preserved conceptually across QSR and QMSR (ISO 13485 §7.3.10
  # "design and development files" and §4.2.5 records-control are refinements,
  # not renames, and v0.4 did not introduce ISO-side target values for either);
  # a future release can add DHF / DHR aliases when and if dedicated ISO-side
  # targets are introduced to stable_categories. Propose_only per default.
  control_object:
    device_master_record_control:
      alias_to: medical_device_file_control
      proposed_at: "2026-04-21"
      approval_status: "propose_only"
      note: >-
        QSR-era term (21 CFR 820.181 Device Master Record, pre-2026-02-02).
        Best-effort mapping to the broader ISO 13485 §4.2.3 Medical Device File
        concept. The MDF is a superset: a DMR is narrower than an MDF in both
        scope and required content. For control-object references that cite
        QSR §820.181 directly, retain device_master_record_control. For
        QMSR-era control objects or enterprise quality objects authored under
        ISO 13485, use medical_device_file_control. Mirrors aliases.record_type.
        device_master_record added in v0.4 and fulfils the v0.4 revision-history
        claim of aliases.control_object population. Per IMP-TAX-015 /
        IMP-TAX-004 dual-vocabulary handling.

  process:
    device_master_record_maintenance:
      alias_to: medical_device_file_maintenance
      proposed_at: "2026-04-21"
      approval_status: "propose_only"
      note: >-
        QSR-era process (21 CFR 820.181-driven DMR maintenance, pre-2026-02-02).
        Best-effort mapping to the broader ISO 13485 §4.2.3 Medical Device File
        maintenance process. Same breadth asymmetry as the control_object
        counterpart: citations that reference §820.181 directly should retain
        device_master_record_maintenance; citations authored under QMSR or
        ISO 13485 should use medical_device_file_maintenance. Mirrors
        aliases.control_object.device_master_record_control added in v0.5 and
        fulfils the v0.4 revision-history claim of aliases.process population.
        Per IMP-TAX-015 / IMP-TAX-004 dual-vocabulary handling.

